<!doctype html>
<html lang="en" id="html">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View Devlog</title>
    <link rel="stylesheet" href="${styleUri}" />
    <link rel="stylesheet" href="${codiconUri}" />
  </head>
  <body class="devlog-body">
    <div class="devlog-container">
      <h2>Devlog</h2>
      <h4 id="meta"></h4>
      <h4 id="duration"></h4>
      <div id="content" class="text-bodies"></div>
      <div id="devlog-media" class="text-bodies">
        <div id="media-buttons-container" class="devlog-media-buttons">
          <button class="" onclick="prevMedia()">
            <i class="codicon codicon-chevron-left"></i>
          </button>
          <div id="dot-container" style="display: flex;" class="devlog-media-buttons">
            <i id="dot1" style="display: block;" class="codicon codicon-circle-filled"></i>
            <i id="dot2" style="display: block;" class="codicon codicon-circle-filled"></i>
            <i id="dot3" style="display: block;" class="codicon codicon-circle-filled"></i>
          </div>
          <button class="" onclick="nextMedia()">
            <i class="codicon codicon-chevron-right"></i>
          </button>
        </div class="center">
        <img
          id="devlog-img"
          class="devlog-media center"
          style="display: block"
          src=""
          alt="devlog-media"
        />
        <video
          id="devlog-vid"
          class="devlog-media center"
          style="display: none"
          src=""
        ></video>
      </div>
    </div>

    <script>
    // vars
      const vscode = acquireVsCodeApi();

      let devlogMedia = [];
      let currentDevlogMedia = 0;

    // general/utilitie functions

      // set default values to current project info
      function populateDevlog(devlog) {
        devlogMedia = Array.isArray(devlog.media) ? devlog.media : [];
        currentDevlogMedia = 0;
        showMedia(currentDevlogMedia);
        document.getElementById("content").innerHTML = parser(devlog.body);
        document.getElementById("duration").textContent =
          "Logged: " + formatDuration(devlog.duration_seconds);
        document.getElementById("meta").textContent =
          devlog.likes_count + "❤️  " + devlog.comments_count + "🗒️";
      }

      function formatDate(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return value;
        }

        return date.toLocaleDateString();
      }

      function formatDuration(value) {
        const secondsIn = value;
        if (secondsIn < 3600) {
          let minutesOut = Math.floor(secondsIn / 60);
          let secondsOut = secondsIn % 60;
          return minutesOut + " min; " + secondsOut + " sec";
        } else {
          let hoursOut = Math.floor(secondsIn / 3600);
          let secondsInMin = secondsIn % 3600;
          let minutesOut = Math.floor(secondsInMin / 60);
          let secondsOut = secondsInMin % 60;
          return (
            hoursOut + " h; " + minutesOut + " min; " + secondsOut + " sec"
          );
        }
      }

      function escapeHtml(value) {
        if (!value) return "";

        return value
          .replace(/&(?!(?:[a-zA-Z]+|#\d+|#x[a-fA-F0-9]+);)/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      // credit to sabioOfficial
      function parser(text) {
        if (!text) return "";

        let html = escapeHtml(text);

        const codeBlocks = [];
        html = html.replace(
          /\`\`\`(\w*)\n([\s\S]*?)\`\`\`/g,
          function (_, language, code) {
            const id = "TOKENCODEBLOCK" + codeBlocks.length + "TOKEN";
            codeBlocks.push(
              '<pre><code class="' +
                language +
                '"><span>' +
                code.trim() +
                "</span></code></pre>",
            );
            return "\n\n" + id + "\n\n";
          },
        );

        html = html
          .replace(/^### (.*$)/gim, "<h3>$1</h3>")
          .replace(/^## (.*$)/gim, "<h2>$1</h2>")
          .replace(/^# (.*$)/gim, "<h1>$1</h1>")
          .replace(/^---$/gim, "<hr/>")
          .replace(/^\s*[-*]\s+(.*)(\n)?/gim, "<ubli>$1</ubli>")
          .replace(/^\s*\d+\.\s+(.*)(\n)?/gim, "<obli>$1</obli>")
          .replace(/^&gt;[ ]?(.*)$/gim, "<bq>$1</bq>");

        html = html
          .replace(/(<ubli>.*<\/ubli>\s*)+/g, function (m) {
            return (
              "<ul>" + m.replace(/ubli/g, "li").replace(/\n/g, "") + "</ul>"
            );
          })
          .replace(/(<obli>.*<\/obli>\s*)+/g, function (m) {
            return (
              "<ol>" + m.replace(/obli/g, "li").replace(/\n/g, "") + "</ol>"
            );
          })
          .replace(/(<bq>.*<\/bq>\s*)+/g, function (m) {
            const content = m.replace(/<\/?bq>/g, "").trim();
            return (
              "<blockquote><p>" +
              content.split("\n").join("</p><p>") +
              "</p></blockquote>"
            );
          });

        html = html
          .split(/\n\n+/)
          .map(function (block) {
            const trimmed = block.trim();
            if (
              /^<(h[1-6]|ul|ol|blockquote|pre|hr)/i.test(trimmed) ||
              trimmed.startsWith("TOKENCODEBLOCK")
            ) {
              return trimmed;
            }
            let processedBlock = trimmed.replace(/\n/g, "<br/>");
            processedBlock = processedBlock.replace(
              /(<\/h[1-6]>)\s*<br\/>/gi,
              "$1",
            );
            return "<p>" + processedBlock + "</p>";
          })
          .join("\n");

        html = html
          .replace(
            /!\[(.*?)\]\((.*?)\)/g,
            '<div class="devlog-image-wrapper"><img src="$2" alt="$1" loading="lazy" /></div>',
          )
          .replace(
            /\[(.*?)\]\((.*?)\)/g,
            '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>',
          )
          .replace(/\*\*\*(.*?)\*\*\*/g, "<strong><em>$1</em></strong>")
          .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
          .replace(/\*(.*?)\*/g, "<em>$1</em>")
          .replace(/__(.*?)__/g, "<strong>$1</strong>")
          .replace(/_(.*?)_/g, "<em>$1</em>")
          .replace(/~~(.*?)~~/g, "<del>$1</del>")
          .replace(/`([^`]+)`/g, "<code>$1</code>");

        codeBlocks.forEach(function (block, i) {
          html = html.replace("TOKENCODEBLOCK" + i + "TOKEN", block);
        });

        return html;
      }

      function setTheme(theme) {
        document.getElementById("html").classList = theme;
      }

    // media functions

      function showMedia(mediaIndex) {
        document.getElementById("devlog-media").style = "display: block;";
        if (!devlogMedia.length || !devlogMedia[mediaIndex]) {
          document.getElementById("devlog-media").style = "display: none;";
          document.getElementById("devlog-img").style = "display: none;";
          document.getElementById("devlog-vid").style = "display: none;";
          return;
        }

        const media = devlogMedia[mediaIndex];
        const contentType = String(media.content_type || "").toLowerCase();

        // show all
        document.getElementById("devlog-img").style = "display: block;";
        document.getElementById("devlog-vid").style = "display: block;";

        // show only correct media type
        if (contentType.startsWith("image")) {
          document.getElementById("devlog-vid").style = "display: none;";
          document.getElementById("devlog-img").src = media.url;
        } else {
          document.getElementById("devlog-img").style = "display: none;";
          document.getElementById("devlog-vid").src = media.url;
        }

        updateDots()
      }

      function nextMedia() {
        if (currentDevlogMedia + 1 > devlogMedia.length - 1) {
          currentDevlogMedia = 0;
          showMedia(currentDevlogMedia);
        } else {
          currentDevlogMedia += 1;
          showMedia(currentDevlogMedia);
        }
      }

      function prevMedia() {
        if (currentDevlogMedia - 1 === -1) {
          currentDevlogMedia = devlogMedia.length - 1;
          showMedia(currentDevlogMedia);
        } else {
          currentDevlogMedia -= 1;
          showMedia(currentDevlogMedia);
        }
      }

      function updateDots() {
        document.getElementById("dot1").style = "display: block;";
        document.getElementById("dot2").style = "display: block;";
        document.getElementById("dot3").style = "display: block;";
        document.getElementById("dot1").classList = "codicon codicon-circle-filled";
        document.getElementById("dot2").classList = "codicon codicon-circle-filled";
        document.getElementById("dot3").classList = "codicon codicon-circle-filled";
        document.getElementById("dot-container").style = "display: flex;";
        document.getElementById("media-buttons-container").style = "display: flex;";

        if (devlogMedia.length > 2) {
          if (currentDevlogMedia === 0) {
            document.getElementById("dot1").classList = "codicon codicon-circle-large-filled";
          } else if (currentDevlogMedia === devlogMedia.length - 1) {
            document.getElementById("dot3").classList = "codicon codicon-circle-large-filled";
          } else {
            document.getElementById("dot2").classList = "codicon codicon-circle-large-filled";
          }
        } else if (devlogMedia.length === 2) {
          document.getElementById("dot3").style = "display: none;";
          document.getElementById(`dot${currentDevlogMedia + 1}`).classList = "codicon codicon-circle-large-filled";
        } else {
          document.getElementById("media-buttons-container").style = "display: none;";
        }
      }

    // listens for messages from the extentsion
      window.addEventListener("message", (event) => {
        const message = event.data;

        switch (message.command) {
          case "devlog-info": {
            populateDevlog(message.value);
            break;
          }
          case "set-theme": {
            setTheme(message.value);
            break;
          }
        }
      });
    </script>
  </body>
</html>
